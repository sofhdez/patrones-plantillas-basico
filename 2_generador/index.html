<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <title>Generador de Cumplidos</title>

  <!-- ===========================================================
     PLANTILLA: GENERADOR DE CUMPLIDOS
     Cada vez que aprietas el botón aparece un mensaje al azar.
     Busca los  ✏️  para saber qué puedes cambiar.
     =========================================================== -->


</head>

<body>

  <div class="tarjeta">
    <!-- ✏️ Cámbiame: el título -->
    <h1>✨ Cumplido del día ✨</h1>
    <p class="sub">Aprieta el botón cada vez que necesites una sonrisa.</p>

    <div class="caja">
      <p id="mensaje">Haz clic abajo 👇</p>
    </div>

    <!-- ✏️ Cámbiame: el texto del botón -->
    <button id="boton">Dame un cumplido 💖</button>

    <p class="contador">Llevas <span id="cuenta">0</span> cumplidos hoy</p>
  </div>

  <script src="script.js"></script>

</body>

</html>
