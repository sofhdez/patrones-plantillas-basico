<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <title>Mi Bio-Link</title>

  <!-- ===========================================================
     PLANTILLA: MI BIO-LINK
     Una página con tu foto, tu nombre y tus enlaces favoritos.
     Busca los  ✏️  para saber qué puedes cambiar.
     =========================================================== -->

</head>

<body>

  <div class="tarjeta">

    <div class="portada"></div>

    <div class="contenido">

      <!-- ✏️ Cámbiame: pon tu emoji favorito (abajo te decimos cómo poner una foto) -->
      <div class="avatar">🌟</div>

      <!-- ✏️ Cámbiame: tu nombre -->
      <h1>Tu Nombre</h1>

      <!-- ✏️ Cámbiame: tu usuario o apodo -->
      <p class="usuario">@tu_usuario</p>

      <!-- ✏️ Cámbiame: una o dos frases sobre ti -->
      <p class="bio">Me encanta dibujar, la música y aprender cosas nuevas. ¡Bienvenida a mi página! 🎧</p>

      <!-- ✏️ Cámbiame: tus redes. Cambia el emoji y la dirección de cada una. -->
      <div class="redes">
        <a href="https://es.wikipedia.org" title="Instagram">📷</a>
        <a href="https://es.wikipedia.org" title="YouTube">▶️</a>
        <a href="https://es.wikipedia.org" title="Correo">✉️</a>
      </div>

      <div class="enlaces">
        <!-- ✏️ Cámbiame: el texto y la dirección de cada enlace.
             Para agregar otro, copia una línea completa y pégala debajo. -->
        <a href="https://es.wikipedia.org">🎨 Mi galería de dibujos</a>
        <a href="https://es.wikipedia.org">🎵 Mi playlist favorita</a>
        <a href="https://es.wikipedia.org">📖 Mi blog</a>
        <a href="https://es.wikipedia.org">🎮 Mi juego favorito</a>
      </div>

      <div class="gustos">
        <!-- ✏️ Cámbiame: cosas que te gustan. Copia un <span> para agregar más. -->
        <h2>Me gusta</h2>
        <span class="chip">🎨 Dibujar</span>
        <span class="chip">📚 Leer</span>
        <span class="chip">🌱 Plantas</span>
        <span class="chip">🐱 Gatos</span>
        <span class="chip">🎮 Videojuegos</span>
      </div>

      <footer>Hecho con 💛 en el Taller de Programación</footer>

    </div>
  </div>

  <!-- 💡 ¿Quieres una foto de verdad en lugar del emoji?
       Borra el <div class="avatar">🌟</div> y pon en su lugar:
       <img class="avatar" src="PEGA-AQUÍ-LA-DIRECCIÓN-DE-TU-FOTO" alt="Mi foto"> -->

  <script src="script.js"></script>

</body>

</html>
