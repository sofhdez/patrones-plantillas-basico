<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <title>Mi Galería</title>

  <!-- ===========================================================
     PLANTILLA: MI GALERÍA / SCRAPBOOK
     Un álbum con tus fotos favoritas y un texto debajo de cada una.
     Busca los  ✏️  para saber qué puedes cambiar.
     =========================================================== -->

</head>

<body>

  <div class="encabezado">
    <!-- ✏️ Cámbiame: el título y el subtítulo de tu álbum -->
    <h1>📸 Mi Álbum</h1>
    <p>Mis momentos favoritos del año</p>
  </div>

  <div class="galeria">

    <!-- ✏️ Cámbiame: cada bloque .foto es una imagen del álbum.
         Cambia el emoji, el texto y la fecha.
         Para agregar otra foto, copia un bloque .foto completo y pégalo. -->

    <div class="foto">
      <div class="imagen">🐱</div>
      <p class="pie">Mi gato durmiendo</p>
      <p class="fecha">Enero</p>
    </div>

    <div class="foto">
      <div class="imagen">🌅</div>
      <p class="pie">El atardecer de la playa</p>
      <p class="fecha">Marzo</p>
    </div>

    <div class="foto">
      <div class="imagen">🍰</div>
      <p class="pie">El pastel que horneamos</p>
      <p class="fecha">Abril</p>
    </div>

    <div class="foto">
      <div class="imagen">🎸</div>
      <p class="pie">Mi primer concierto</p>
      <p class="fecha">Junio</p>
    </div>

    <div class="foto">
      <div class="imagen">🏕️</div>
      <p class="pie">Campamento con amigas</p>
      <p class="fecha">Julio</p>
    </div>

    <div class="foto">
      <div class="imagen">🎨</div>
      <p class="pie">Mi cuadro terminado</p>
      <p class="fecha">Septiembre</p>
    </div>

  </div>

  <!-- 💡 ¿Quieres usar fotos de verdad en lugar de emojis?
       Cambia esta línea:   <div class="imagen">🐱</div>
       por esta otra:       <img class="imagen" src="PEGA-AQUÍ-LA-DIRECCIÓN" alt="Mi foto" style="width:100%"> -->

  <script src="script.js"></script>

</body>

</html>
